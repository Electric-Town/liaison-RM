name: Format Rust workspace once

on:
  push:
    branches:
      - agent/r1-rust-ddd-cli-v3
    paths:
      - ".github/workflows/format-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r1-rust-ddd-cli-v3
          fetch-depth: 0
      - name: Configure author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Generate lockfile and apply rustfmt
        run: |
          cargo generate-lockfile
          cargo fmt --all
          rm .github/workflows/format-once.yml
      - name: Commit deterministic results
        run: |
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: format Rust workspace and lock dependencies"
          git push origin HEAD:agent/r1-rust-ddd-cli-v3
