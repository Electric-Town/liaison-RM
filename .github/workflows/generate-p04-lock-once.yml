name: Generate P04 frontend lock once

on:
  push:
    branches: [feat/p04-typed-react-foundation]
    paths:
      - ".github/workflows/generate-p04-lock-once.yml"

permissions:
  contents: write

concurrency:
  group: generate-p04-frontend-lock
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p04-typed-react-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate and verify deterministic lockfile
        shell: bash
        run: |
          set -euo pipefail
          cd apps/desktop/ui-react
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --ignore-scripts --no-audit --no-fund
          npm run typecheck
          npm run test
          npm run build
          cd ../../..
          python3 scripts/check_design_contract.py
          python3 scripts/check_frontend_contract.py
          git diff --check
          rm .github/workflows/generate-p04-lock-once.yml
      - name: Commit the lockfile and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/ui-react/package-lock.json .github/workflows/generate-p04-lock-once.yml
          git diff --cached --check
          git commit -m "chore(p04): lock the typed frontend dependency graph"
          git push origin HEAD:feat/p04-typed-react-foundation
