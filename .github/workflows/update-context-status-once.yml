name: Update repository context status once

on:
  push:
    branches: [docs-repository-context]
    paths:
      - ".github/workflows/update-context-status-once.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-repository-context
          fetch-depth: 0
      - name: Refresh current-state sections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace('It combines:\n', 'The planned product combines:\n', 1)
          old = '''As of 2026-07-18:

          - PR #2 — governance, KCS-informed practice, DDD, UX, accessibility, and content standards;
          - PR #3 — product, architecture, machine-readable requirements, prototype, and screens;
          - PR #4 — Rust Workspace/People core, Markdown adapter, and CLI;
          - PR #7 — provider-neutral Connections contract and local reference provider;
          - PR #8 — draft native macOS/Tauri alpha; not yet a verified Mac application.
          '''
          new = '''As of 2026-07-18:

          - `main` includes governance, product and interaction specifications, the Rust Workspace/People/CLI slice, provider-neutral Connections, Topic Pack contracts, purpose-specific readiness, and reason-only Review and Attention runtime foundations;
          - PR #8 contains the native Tauri/macOS alpha and tested review bundles; public signing, notarisation, clean-Mac UAT, and supported distribution remain closed;
          - PR #20 contains localisation architecture, pseudolocale testing, and human-review gates; its non-source catalogues are not production translations;
          - PR #18 is the repository-context and agent-handoff change containing this README and `PROJECT_CONTEXT.md`.
          '''
          if old not in text:
              raise SystemExit('README current-work block was not found')
          readme.write_text(text.replace(old, new, 1), encoding='utf-8')

          context = Path('PROJECT_CONTEXT.md')
          text = context.read_text(encoding='utf-8')
          text = text.replace(
              'The repository has product, architecture, governance, machine-readable planning, prototype, Rust, CLI, Markdown adapter, and provider-contract foundations. It does not yet have a supported public release.',
              'The default branch contains governance, product and interaction specifications, machine-readable planning, the Rust Workspace/People/CLI and Markdown slice, provider-neutral Connections, Topic Pack contracts, purpose-specific profile readiness, and reason-only Review and Attention runtime foundations. It does not yet have a supported public release.',
              1,
          )
          old = '''| PR | Scope | State at last update |
          |---:|---|---|
          | 2 | Governance, KCS-informed practice, DDD, UX, accessibility, content standards | Open draft |
          | 3 | Product, architecture, requirements, UAT, gates, prototype and screens | Open draft |
          | 4 | Rust Workspace/People, Markdown adapter and CLI | Open draft; cross-platform Rust checks previously passed |
          | 7 | Connections, `object-store@1`, provider SDK and local reference adapter | Open and ready for review |
          | 8 | Native Tauri/macOS alpha | Open draft; no verified Mac app yet |
          '''
          new = '''| Ref | Scope | State at last update |
          |---:|---|---|
          | `main` | Governance, product and interaction specification, CLI/Markdown slice, Connections, Topic Pack contract, Profiles and reason-only Review runtime | Implemented on the default branch; no supported public release |
          | 8 | Native Tauri/macOS alpha and architecture-specific review bundles | Open and ready for review; Developer ID signing, notarisation, clean-Mac UAT, and supported distribution remain closed |
          | 20 | Localisation catalogues, pseudolocale, validation, and human-review gates | Open and ready for review; non-source catalogues are structural/draft fixtures, not approved translations |
          | 18 | Repository README, complete project context, agent entry points, and About metadata contract | Current documentation pull request |
          '''
          if old not in text:
              raise SystemExit('PROJECT_CONTEXT current-review table was not found')
          context.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm .github/workflows/update-context-status-once.yml
      - name: Commit current-state refresh
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: align project context with current main and active reviews"
          git push origin HEAD:docs-repository-context
