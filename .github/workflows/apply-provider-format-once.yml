name: Apply provider formatting once

on:
  push:
    branches: [agent/r1-provider-sdk-v4]
    paths:
      - ".github/workflows/apply-provider-format-once.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r1-provider-sdk-v4
          fetch-depth: 0
      - name: Configure commit identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Format source and resolve the lockfile
        run: |
          cargo fmt --all
          cargo generate-lockfile
          rm .github/workflows/apply-provider-format-once.yml
          rm -f .github/workflows/provider-format-artifact.yml
          rm -f .github/workflows/generate-provider-lock.yml
      - name: Commit deterministic outputs
        run: |
          git add -A
          git diff --cached --check
          git commit -m "chore: format provider source and refresh lockfile"
          git push origin HEAD:agent/r1-provider-sdk-v4
