name: Apply provider implementation payload

on:
  push:
    branches:
      - agent/r1-provider-sdk-v4
    paths:
      - ".bootstrap/provider-payload/READY"
  pull_request:
    branches:
      - agent/r1-rust-ddd-cli-v3
    types: [opened, synchronize, reopened]
    paths:
      - ".bootstrap/provider-payload/READY"

permissions:
  contents: write

concurrency:
  group: apply-provider-payload
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'agent/r1-provider-sdk-v4'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out provider branch
        uses: actions/checkout@v4
        with:
          ref: agent/r1-provider-sdk-v4
          fetch-depth: 0

      - name: Reconstruct and verify payload
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/provider-payload/part-* > /tmp/provider-pr.tar.gz.b64
          echo "53041a851bcdeb96631092ac65b734daa1eb1d829a816e90a58447cc1771d56a  /tmp/provider-pr.tar.gz.b64" | sha256sum -c -
          base64 --decode /tmp/provider-pr.tar.gz.b64 > /tmp/provider-pr.tar.gz
          echo "15a6ebd1461c055e772dd5282dceb2723f5ddc6baadc0f6ae8db79fcb5e209c3  /tmp/provider-pr.tar.gz" | sha256sum -c -
          mkdir -p /tmp/provider-pr
          tar -xzf /tmp/provider-pr.tar.gz -C /tmp/provider-pr
          rsync -a /tmp/provider-pr/ ./

      - name: Restore provider SDK build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sed -i '/walkdir = "2.5"/a wit-parser = "0.252.0"' Cargo.toml
          cat > crates/liaison-provider-sdk/Cargo.toml <<'EOF'
          [package]
          name = "liaison-provider-sdk"
          version.workspace = true
          edition.workspace = true
          license.workspace = true
          repository.workspace = true
          rust-version.workspace = true

          [dependencies]
          liaison-connections = { path = "../../contexts/connections" }
          serde.workspace = true

          [dev-dependencies]
          wit-parser.workspace = true

          [lints]
          workspace = true
          EOF

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy
          rustc --version --verbose
          cargo --version

      - name: Generate provider lockfile
        run: cargo generate-lockfile

      - name: Format provider sources
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all --check

      - name: Validate repository policy
        run: python scripts/check_repository.py

      - name: Validate product specification
        run: python scripts/check_spec.py

      - name: Validate architecture boundaries
        run: python scripts/check_architecture.py

      - name: Validate provider descriptors
        run: python scripts/check_providers.py

      - name: Check Connections context
        run: cargo check -p liaison-connections --all-targets --all-features

      - name: Check provider registry adapter
        run: cargo check -p liaison-provider-registry-memory --all-targets --all-features

      - name: Check local object-store adapter
        run: cargo check -p liaison-object-store-local --all-targets --all-features

      - name: Check provider SDK library
        run: cargo check -p liaison-provider-sdk --lib --all-features

      - name: Check provider SDK WIT test
        run: cargo check -p liaison-provider-sdk --test wit_contract --all-features

      - name: Check complete workspace
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Lint Connections context
        run: cargo clippy -p liaison-connections --all-targets --all-features -- -D warnings

      - name: Lint provider registry adapter
        run: cargo clippy -p liaison-provider-registry-memory --all-targets --all-features -- -D warnings

      - name: Lint local object-store adapter
        run: cargo clippy -p liaison-object-store-local --all-targets --all-features -- -D warnings

      - name: Lint provider SDK
        run: cargo clippy -p liaison-provider-sdk --all-targets --all-features -- -D warnings

      - name: Lint complete workspace
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test workspace
        run: cargo test --workspace --all-features --locked

      - name: Publish reviewed provider changes
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap/provider-payload
          rm -f .github/workflows/apply-provider-payload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: complete provider contracts and local reference adapter"
          git push origin HEAD:agent/r1-provider-sdk-v4
