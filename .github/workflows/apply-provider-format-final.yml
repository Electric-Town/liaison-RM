name: Apply provider formatting final

on:
  push:
    branches: [agent/r1-provider-sdk-v4]
    paths:
      - ".github/workflows/apply-provider-format-final.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r1-provider-sdk-v4
          fetch-depth: 0
      - run: |
          cargo fmt --all
          rm .github/workflows/apply-provider-format-final.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: format provider conformance refactor"
          git push origin HEAD:agent/r1-provider-sdk-v4
