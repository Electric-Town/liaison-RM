name: Relationship contracts

on:
  pull_request:
    paths:
      - "docs/architecture/review-and-attention.md"
      - "docs/architecture/topic-packs-and-field-states.md"
      - "docs/knowledge/KCS-0005-why-does-liaison-not-use-a-relationship-strength-score.md"
      - "examples/configuration/topic-pack-and-review-policy.yaml"
      - "schemas/profile-configuration.schema.json"
      - "schemas/review-policy.schema.json"
      - "scripts/check_relationship_contracts.py"
      - ".github/workflows/relationship-contracts.yml"
  push:
    branches: [main]
    paths:
      - "docs/architecture/review-and-attention.md"
      - "docs/architecture/topic-packs-and-field-states.md"
      - "docs/knowledge/KCS-0005-why-does-liaison-not-use-a-relationship-strength-score.md"
      - "examples/configuration/topic-pack-and-review-policy.yaml"
      - "schemas/profile-configuration.schema.json"
      - "schemas/review-policy.schema.json"
      - "scripts/check_relationship_contracts.py"
      - ".github/workflows/relationship-contracts.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check PyYAML==6.0.2 jsonschema==4.25.1
      - run: python scripts/check_relationship_contracts.py
      - run: python scripts/check_repository.py
