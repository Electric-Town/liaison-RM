name: Repair direct provider sources

on:
  push:
    branches:
      - agent/r1-provider-sdk-v4
    paths:
      - ".bootstrap/provider-repair/READY"
  pull_request:
    branches:
      - agent/r1-rust-ddd-cli-v3
    types: [opened, synchronize, reopened]
    paths:
      - ".bootstrap/provider-repair/READY"

permissions:
  contents: write

concurrency:
  group: repair-direct-provider-sources
  cancel-in-progress: false

jobs:
  repair:
    if: github.event_name == 'push' || github.head_ref == 'agent/r1-provider-sdk-v4'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out provider branch
        uses: actions/checkout@v4
        with:
          ref: agent/r1-provider-sdk-v4
          fetch-depth: 0

      - name: Apply reviewed source repair
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .bootstrap/provider-payload/fix.py.gz.b64 | gzip -dc > /tmp/provider-fix.py
          python /tmp/provider-fix.py

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.97.1
          rustc --version --verbose
          cargo --version --verbose

      - name: Format and regenerate lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-lockfile
          cargo fmt --all
          cargo fmt --all --check

      - name: Validate repository and contracts
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_repository.py
          python scripts/check_spec.py
          python scripts/check_architecture.py
          python scripts/check_providers.py
          python scripts/check_wit_contract.py

      - name: Check, lint, and test
        shell: bash
        run: |
          set -euo pipefail
          cargo check --workspace --all-targets --all-features --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked

      - name: Publish clean direct sources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap/provider-payload .bootstrap/provider-repair
          rm -f .github/workflows/repair-provider-direct.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete provider conformance implementation"
          git push origin HEAD:agent/r1-provider-sdk-v4
