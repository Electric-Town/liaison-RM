        assert!(sealed_definition.is_ok());
        let Ok(sealed_definition) = sealed_definition else {
            return;
        };
        let sealed = FieldValue::new(
            &sealed_definition,
            InformationState::Verified,
            Some("Step-free route".to_owned()),
