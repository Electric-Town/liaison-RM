          insert_marker = "#[derive(Debug, Clone, Serialize, Deserialize)]\nstruct PersonDocument"
          adapter = r'''
impl ProfileRepository for MarkdownVault {
    fn load(&self, workspace: &Path, person_id: PersonId) -> Result<ProfileRecord, ProfileError> {
        MarkdownVault::ensure_workspace(workspace)
            .map_err(|error| ProfileError::Storage(error.to_string()))?;
        let path = Self::profile_path(workspace, person_id);
        let text = fs::read_to_string(&path).map_err(|error| {
            if error.kind() == io::ErrorKind::NotFound {
                ProfileError::NotFound
            } else {
                storage_profile(error)
            }
        })?;
        let document: ProfileDocument = serde_yaml::from_str(&text).map_err(storage_profile)?;
        document.into_domain(person_id)
    }

    fn save(
        &self,
        workspace: &Path,
        record: &ProfileRecord,
        expected_revision: Option<Revision>,
    ) -> Result<(), ProfileError> {
        MarkdownVault::ensure_workspace(workspace)
            .map_err(|error| ProfileError::Storage(error.to_string()))?;
        if record
            .snapshot()
            .values()
            .values()
            .any(liaison_profiles::FieldValue::is_sealed)
        {
            let field_id = record
                .snapshot()
                .values()
                .values()
                .find(|value| value.is_sealed())
                .map(|value| value.field_id().clone())
                .ok_or_else(|| ProfileError::Storage("sealed profile value was not identified".to_owned()))?;
            return Err(ProfileError::SealedPersistenceUnavailable(field_id));
        }

        let path = Self::profile_path(workspace, record.person_id());
        fs::create_dir_all(Self::profiles_path(workspace)).map_err(storage_profile)?;
        let existing = match fs::read_to_string(&path) {
            Ok(text) => Some(serde_yaml::from_str::<ProfileDocument>(&text).map_err(storage_profile)?),
            Err(error) if error.kind() == io::ErrorKind::NotFound => None,
            Err(error) => return Err(storage_profile(error)),
        };

        match (expected_revision, existing.as_ref()) {
            (None, None) => {
                if record.revision() != Revision::INITIAL {
                    return Err(ProfileError::RevisionConflict {
                        expected: Revision::INITIAL.get(),
                        found: record.revision().get(),
                    });
                }
            }
            (None, Some(_)) => return Err(ProfileError::AlreadyExists),
            (Some(_), None) => return Err(ProfileError::NotFound),
            (Some(expected), Some(found)) if found.revision == expected => {
                let next = expected
                    .next()
                    .map_err(|_| ProfileError::RevisionOverflow)?;
                if record.revision() != next {
                    return Err(ProfileError::RevisionConflict {
                        expected: next.get(),
                        found: record.revision().get(),
                    });
                }
            }
            (Some(expected), Some(found)) => {
                return Err(ProfileError::RevisionConflict {
                    expected: expected.get(),
                    found: found.revision.get(),
                });
            }
        }

        let extra = existing.map_or_else(BTreeMap::new, |document| document.extra);
        let document = ProfileDocument::from_domain(record, extra);
        let yaml = serde_yaml::to_string(&document).map_err(storage_profile)?;
        if path.exists() {
            atomic_replace(&path, yaml.as_bytes()).map_err(storage_profile)
        } else {
            atomic_create(&path, yaml.as_bytes()).map_err(storage_profile)
        }
    }
}

#[derive(Debug, Clone, Serialize, Deserialize)]
struct ProfileDocument {
    format: String,
    schema_version: u32,
    person_id: PersonId,
    revision: Revision,
    snapshot: ProfileSnapshot,
    #[serde(flatten)]
    extra: BTreeMap<String, Value>,
}

impl ProfileDocument {
    fn from_domain(record: &ProfileRecord, extra: BTreeMap<String, Value>) -> Self {
        Self {
            format: PROFILE_FORMAT.to_owned(),
            schema_version: PROFILE_SCHEMA_VERSION,
            person_id: record.person_id(),
            revision: record.revision(),
            snapshot: record.snapshot().clone(),
            extra,
        }
    }

    fn into_domain(self, expected_person_id: PersonId) -> Result<ProfileRecord, ProfileError> {
        if self.format != PROFILE_FORMAT {
            return Err(ProfileError::Storage(format!(
                "unexpected profile format: {}",
                self.format
            )));
        }
        if self.schema_version != PROFILE_SCHEMA_VERSION {
            return Err(ProfileError::Storage(format!(
                "unsupported profile schema: {}",
                self.schema_version
            )));
        }
        if self.person_id != expected_person_id {
            return Err(ProfileError::Storage(format!(
                "profile person ID mismatch: expected {expected_person_id}, found {}",
                self.person_id
            )));
        }
        ProfileRecord::from_parts(self.person_id, self.revision, self.snapshot)
    }
}

fn storage_profile(error: impl std::fmt::Display) -> ProfileError {
    ProfileError::Storage(error.to_string())
}

