        let Ok(value) = value else {
            return;
        };
        let mut record = super::ProfileRecord::new(PersonId::new());
        assert_eq!(record.revision(), liaison_shared_kernel::Revision::INITIAL);
        assert!(record.set_value(value).is_ok());
        assert_eq!(record.revision().get(), 2);

