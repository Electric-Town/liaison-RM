          )
          vault_text = vault_text.replace(
              "    fn people_path(root: &Path) -> PathBuf {\n        root.join(\"people\")\n    }\n",
              "    fn people_path(root: &Path) -> PathBuf {\n        root.join(\"people\")\n    }\n\n    fn profiles_path(root: &Path) -> PathBuf {\n        root.join(\"profiles\")\n    }\n\n    fn profile_path(root: &Path, person_id: PersonId) -> PathBuf {\n        Self::profiles_path(root).join(format!(\"{person_id}.yaml\"))\n    }\n",
              1,
          )
          vault_text = vault_text.replace(
              "            \"people\",\n            \"organisations\",\n",
              "            \"people\",\n            \"profiles\",\n            \"organisations\",\n",
              1,
          )
          vault_text = vault_text.replace(
              "            \"people\",\n            \"organisations\",\n            \"relationships\",\n",
              "            \"people\",\n            \"profiles\",\n            \"organisations\",\n            \"relationships\",\n",
              1,
