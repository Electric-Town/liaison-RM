          )
          vault_text = vault_text.replace(
              "const PERSON_SCHEMA_VERSION: u32 = 1;\n",
              "const PERSON_SCHEMA_VERSION: u32 = 1;\nconst PROFILE_FORMAT: &str = \"liaison-profile-values\";\nconst PROFILE_SCHEMA_VERSION: u32 = 1;\n",
