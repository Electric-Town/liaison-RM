name: Apply profile persistence once

on:
  push:
    branches: [agent/r3-profile-values-persistence]
    paths:
      - ".github/workflows/apply-profile-persistence-once.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r3-profile-values-persistence
          fetch-depth: 0
      - name: Add profile persistence domain and adapter slice
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          profiles = Path("contexts/profiles/src/lib.rs")
          text = profiles.read_text(encoding="utf-8")

          text = text.replace(
              "use serde::{Deserialize, Serialize};\n",
              "use liaison_shared_kernel::{PersonId, Revision};\nuse serde::{Deserialize, Serialize};\nuse std::path::Path;\n",
              1,
          )

          marker = "#[derive(Debug, Clone, PartialEq, Eq, Default, Serialize, Deserialize)]\npub struct ProfileSnapshot"
          addition = r'''
#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]
pub struct ProfileRecord {
    person_id: PersonId,
    revision: Revision,
    snapshot: ProfileSnapshot,
}

impl ProfileRecord {
    #[must_use]
    pub fn new(person_id: PersonId) -> Self {
        Self {
            person_id,
            revision: Revision::INITIAL,
            snapshot: ProfileSnapshot::new(),
        }
    }

    #[must_use]
    pub const fn person_id(&self) -> PersonId {
        self.person_id
    }

    #[must_use]
    pub const fn revision(&self) -> Revision {
        self.revision
    }

    #[must_use]
    pub const fn snapshot(&self) -> &ProfileSnapshot {
        &self.snapshot
    }

    #[must_use]
    pub fn into_snapshot(self) -> ProfileSnapshot {
        self.snapshot
    }

    pub fn set_value(&mut self, value: FieldValue) -> Result<(), ProfileError> {
        if value.is_sealed() {
            return Err(ProfileError::SealedPersistenceUnavailable(
                value.field_id().clone(),
            ));
        }
        self.snapshot.set(value);
        self.revision = self
            .revision
            .next()
            .map_err(|_| ProfileError::RevisionOverflow)?;
        Ok(())
    }

    pub fn from_parts(
        person_id: PersonId,
        revision: Revision,
        snapshot: ProfileSnapshot,
    ) -> Result<Self, ProfileError> {
        if let Some(value) = snapshot.values().values().find(|value| value.is_sealed()) {
            return Err(ProfileError::SealedPersistenceUnavailable(
                value.field_id().clone(),
            ));
        }
        Ok(Self {
            person_id,
            revision,
            snapshot,
        })
    }
}

pub trait ProfileRepository {
    fn load(&self, workspace: &Path, person_id: PersonId) -> Result<ProfileRecord, ProfileError>;

    fn save(
        &self,
        workspace: &Path,
        record: &ProfileRecord,
        expected_revision: Option<Revision>,
    ) -> Result<(), ProfileError>;
}

#[derive(Debug)]
pub struct LoadProfile<Repository> {
    repository: Repository,
}

impl<Repository> LoadProfile<Repository>
where
    Repository: ProfileRepository,
{
    #[must_use]
    pub const fn new(repository: Repository) -> Self {
        Self { repository }
    }

    pub fn execute(
        &self,
        workspace: &Path,
        person_id: PersonId,
    ) -> Result<ProfileRecord, ProfileError> {
        self.repository.load(workspace, person_id)
    }
}

#[derive(Debug)]
pub struct SaveProfile<Repository> {
    repository: Repository,
}

impl<Repository> SaveProfile<Repository>
where
    Repository: ProfileRepository,
{
    #[must_use]
    pub const fn new(repository: Repository) -> Self {
        Self { repository }
    }

    pub fn execute(
        &self,
        workspace: &Path,
        record: &ProfileRecord,
        expected_revision: Option<Revision>,
    ) -> Result<(), ProfileError> {
        self.repository.save(workspace, record, expected_revision)
    }
}

'''
          if "pub struct ProfileRecord" not in text:
              if marker not in text:
                  raise SystemExit("ProfileSnapshot marker missing")
              text = text.replace(marker, addition + marker, 1)

          error_marker = "    #[error(\"purpose {0} must define at least one acceptable information state\")]\n    PurposeHasNoAcceptableStates(PurposeId),\n"
          error_addition = error_marker + r'''    #[error("profile record was not found")]
    NotFound,
    #[error("profile record already exists")]
    AlreadyExists,
    #[error("profile revision conflict: expected {expected}, found {found}")]
    RevisionConflict { expected: u64, found: u64 },
    #[error("profile revision overflowed")]
    RevisionOverflow,
    #[error("sealed field {0} requires an approved sealed-store adapter")]
    SealedPersistenceUnavailable(FieldId),
    #[error("profile storage error: {0}")]
    Storage(String),
'''
          if "SealedPersistenceUnavailable" not in text:
              if error_marker not in text:
                  raise SystemExit("ProfileError marker missing")
              text = text.replace(error_marker, error_addition, 1)

          tests_marker = "    #[test]\n    fn field_ids_are_stable_and_namespaced()"
          tests_addition = r'''    #[test]
    fn profile_record_increments_revision_and_rejects_sealed_plaintext() {
        use liaison_shared_kernel::PersonId;

        let definition = field("identity.preferred_channel", Classification::Private, false);
        assert!(definition.is_ok());
        let Ok(definition) = definition else {
            return;
        };
        let value = FieldValue::new(
            &definition,
            InformationState::Known,
            Some("email".to_owned()),
            false,
