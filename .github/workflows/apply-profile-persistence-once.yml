          vault_cargo.write_text(vault_cargo_text, encoding="utf-8")

          vault = Path("adapters/vault-markdown/src/lib.rs")
          vault_text = vault.read_text(encoding="utf-8")
          vault_text = vault_text.replace(
              "use liaison_people::{PeopleError, PersonProfile, PersonRepository};\n",
              "use liaison_people::{PeopleError, PersonProfile, PersonRepository};\nuse liaison_profiles::{ProfileError, ProfileRecord, ProfileRepository, ProfileSnapshot};\n",
