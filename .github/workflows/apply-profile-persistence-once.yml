name: Apply profile persistence once

on:
  push:
    branches: [agent/r3-profile-values-persistence]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'agent/r3-profile-values-persistence'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r3-profile-values-persistence
          fetch-depth: 0
      - name: Materialize profile module and adapter
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          profiles = Path("contexts/profiles/src/lib.rs")
          text = profiles.read_text(encoding="utf-8")
          declaration = Path("contexts/profiles/src/lib.include").read_text(encoding="utf-8")
          marker = "#![allow(clippy::missing_errors_doc, clippy::module_name_repetitions)]\n"
          if "mod persistence;" not in text:
              if marker not in text:
                  raise SystemExit("profiles crate attribute marker missing")
              text = text.replace(marker, marker + "\n" + declaration, 1)
          profiles.write_text(text, encoding="utf-8")

          root = Path("Cargo.toml")
          root_text = root.read_text(encoding="utf-8")
          member = '    "adapters/profile-store-markdown",\n'
          if member not in root_text:
              root_text = root_text.replace(
                  '    "adapters/object-store-local",\n',
                  '    "adapters/object-store-local",\n' + member,
                  1,
              )
          root.write_text(root_text, encoding="utf-8")
          PY
          mkdir -p adapters/profile-store-markdown/src
          cat > adapters/profile-store-markdown/Cargo.toml <<'EOF'
          [package]
          name = "liaison-profile-store-markdown"
          version.workspace = true
          edition.workspace = true
          license.workspace = true
          repository.workspace = true
          rust-version.workspace = true

          [dependencies]
          liaison-profiles = { path = "../../contexts/profiles" }
          liaison-shared-kernel = { path = "../../crates/liaison-shared-kernel" }
          serde.workspace = true
          serde_yaml.workspace = true
          tempfile.workspace = true

          [dev-dependencies]
          liaison-people = { path = "../../contexts/people" }
          liaison-vault-markdown = { path = "../vault-markdown" }
          liaison-workspace = { path = "../../contexts/workspace" }
          tempfile.workspace = true

          [lints]
          workspace = true
          EOF
          cat > adapters/profile-store-markdown/README.md <<'EOF'
          # Markdown profile-value adapter

          Implements the Identity and Profiles repository port as one versioned YAML sidecar per Person under `profiles/`.

          The adapter preserves unknown top-level extension keys, enforces optimistic revisions, and rejects sealed values rather than writing sensitive plaintext. Sealed storage remains a separate future adapter and grant boundary.
          EOF
          cat > adapters/profile-store-markdown/src/lib.rs <<'EOF'
          #![forbid(unsafe_code)]

          use liaison_profiles::{
              FieldValue, ProfilePersistenceError, ProfileRecord, ProfileRepository, ProfileSnapshot,
          };
          use liaison_shared_kernel::{PersonId, Revision};
          use serde::{Deserialize, Serialize};
          use serde_yaml::Value;
          use std::{collections::BTreeMap, fs, io, path::{Path, PathBuf}};
          use tempfile::NamedTempFile;

          const MANIFEST_PATH: &str = ".liaison/workspace.yaml";
          const PROFILE_FORMAT: &str = "liaison-profile-values";
          const PROFILE_SCHEMA_VERSION: u32 = 1;

          #[derive(Clone, Debug, Default)]
          pub struct MarkdownProfileStore;

          impl MarkdownProfileStore {
              #[must_use]
              pub const fn new() -> Self {
                  Self
              }

              fn ensure_workspace(root: &Path) -> Result<(), ProfilePersistenceError> {
                  if root.join(MANIFEST_PATH).is_file() {
                      Ok(())
                  } else {
                      Err(ProfilePersistenceError::Storage(
                          "workspace manifest was not found".to_owned(),
                      ))
                  }
              }

              fn profiles_path(root: &Path) -> PathBuf {
                  root.join("profiles")
              }

              fn profile_path(root: &Path, person_id: PersonId) -> PathBuf {
                  Self::profiles_path(root).join(format!("{person_id}.yaml"))
              }
          }

          impl ProfileRepository for MarkdownProfileStore {
              fn load(
                  &self,
                  workspace: &Path,
                  person_id: PersonId,
              ) -> Result<ProfileRecord, ProfilePersistenceError> {
                  Self::ensure_workspace(workspace)?;
                  let path = Self::profile_path(workspace, person_id);
                  let text = fs::read_to_string(path).map_err(|error| {
                      if error.kind() == io::ErrorKind::NotFound {
                          ProfilePersistenceError::NotFound
                      } else {
                          storage(error)
                      }
                  })?;
                  let document: ProfileDocument =
                      serde_yaml::from_str(&text).map_err(storage)?;
                  document.into_domain(person_id)
              }

              fn save(
                  &self,
                  workspace: &Path,
                  record: &ProfileRecord,
                  expected_revision: Option<Revision>,
              ) -> Result<(), ProfilePersistenceError> {
                  Self::ensure_workspace(workspace)?;
                  if let Some(value) = record
                      .snapshot()
                      .values()
                      .values()
                      .find(|value| value.is_sealed())
                  {
                      return Err(ProfilePersistenceError::SealedValueUnsupported(
                          value.field_id().clone(),
                      ));
                  }

                  let directory = Self::profiles_path(workspace);
                  fs::create_dir_all(&directory).map_err(storage)?;
                  let path = Self::profile_path(workspace, record.person_id());
                  let existing = read_optional_document(&path)?;

                  match (expected_revision, existing.as_ref()) {
                      (None, None) => {
                          if record.revision() != Revision::INITIAL {
                              return Err(ProfilePersistenceError::RevisionConflict {
                                  expected: Revision::INITIAL.get(),
                                  found: record.revision().get(),
                              });
                          }
                      }
                      (None, Some(_)) => return Err(ProfilePersistenceError::AlreadyExists),
                      (Some(_), None) => return Err(ProfilePersistenceError::NotFound),
                      (Some(expected), Some(found)) if found.revision == expected => {
                          let required = expected
                              .next()
                              .map_err(|_| ProfilePersistenceError::RevisionOverflow)?;
                          if record.revision() != required {
                              return Err(ProfilePersistenceError::RevisionConflict {
                                  expected: required.get(),
                                  found: record.revision().get(),
                              });
                          }
                      }
                      (Some(expected), Some(found)) => {
                          return Err(ProfilePersistenceError::RevisionConflict {
                              expected: expected.get(),
                              found: found.revision.get(),
                          });
                      }
                  }

                  let extra = existing.map_or_else(BTreeMap::new, |document| document.extra);
                  let document = ProfileDocument::from_domain(record, extra);
                  let yaml = serde_yaml::to_string(&document).map_err(storage)?;
                  if path.exists() {
                      atomic_replace(&path, yaml.as_bytes())
                  } else {
                      atomic_create(&path, yaml.as_bytes())
                  }
              }
          }

          #[derive(Clone, Debug, Serialize, Deserialize)]
          struct ProfileDocument {
              format: String,
              schema_version: u32,
              person_id: PersonId,
              revision: Revision,
              snapshot: ProfileSnapshot,
              #[serde(flatten)]
              extra: BTreeMap<String, Value>,
          }

          impl ProfileDocument {
              fn from_domain(record: &ProfileRecord, extra: BTreeMap<String, Value>) -> Self {
                  Self {
                      format: PROFILE_FORMAT.to_owned(),
                      schema_version: PROFILE_SCHEMA_VERSION,
                      person_id: record.person_id(),
                      revision: record.revision(),
                      snapshot: record.snapshot().clone(),
                      extra,
                  }
              }

              fn into_domain(
                  self,
                  expected_person_id: PersonId,
              ) -> Result<ProfileRecord, ProfilePersistenceError> {
                  if self.format != PROFILE_FORMAT {
                      return Err(ProfilePersistenceError::Storage(format!(
                          "unexpected profile format: {}",
                          self.format
                      )));
                  }
                  if self.schema_version != PROFILE_SCHEMA_VERSION {
                      return Err(ProfilePersistenceError::Storage(format!(
                          "unsupported profile schema: {}",
                          self.schema_version
                      )));
                  }
                  if self.person_id != expected_person_id {
                      return Err(ProfilePersistenceError::Storage(format!(
                          "profile person ID mismatch: expected {expected_person_id}, found {}",
                          self.person_id
                      )));
                  }
                  ProfileRecord::from_parts(self.person_id, self.revision, self.snapshot)
              }
          }

          fn read_optional_document(
              path: &Path,
          ) -> Result<Option<ProfileDocument>, ProfilePersistenceError> {
              match fs::read_to_string(path) {
                  Ok(text) => serde_yaml::from_str(&text).map(Some).map_err(storage),
                  Err(error) if error.kind() == io::ErrorKind::NotFound => Ok(None),
                  Err(error) => Err(storage(error)),
              }
          }

          fn atomic_create(path: &Path, content: &[u8]) -> Result<(), ProfilePersistenceError> {
              let parent = path.parent().ok_or_else(|| {
                  ProfilePersistenceError::Storage("profile path has no parent".to_owned())
              })?;
              let mut temporary = NamedTempFile::new_in(parent).map_err(storage)?;
              use std::io::Write as _;
              temporary.write_all(content).map_err(storage)?;
              temporary.as_file().sync_all().map_err(storage)?;
              temporary.persist_noclobber(path).map_err(|error| {
                  if error.error.kind() == io::ErrorKind::AlreadyExists {
                      ProfilePersistenceError::AlreadyExists
                  } else {
                      storage(error.error)
                  }
              })?;
              Ok(())
          }

          fn atomic_replace(path: &Path, content: &[u8]) -> Result<(), ProfilePersistenceError> {
              let parent = path.parent().ok_or_else(|| {
                  ProfilePersistenceError::Storage("profile path has no parent".to_owned())
              })?;
              let mut temporary = NamedTempFile::new_in(parent).map_err(storage)?;
              use std::io::Write as _;
              temporary.write_all(content).map_err(storage)?;
              temporary.as_file().sync_all().map_err(storage)?;
              temporary.persist(path).map_err(|error| storage(error.error))?;
              Ok(())
          }

          fn storage(error: impl std::fmt::Display) -> ProfilePersistenceError {
              ProfilePersistenceError::Storage(error.to_string())
          }

          #[cfg(test)]
          mod tests {
              use super::MarkdownProfileStore;
              use liaison_people::CreatePerson;
              use liaison_profiles::{
                  Classification, FieldDefinition, FieldDefinitionSpec, FieldId, FieldType,
                  FieldValue, InformationState, ProfileRecord, ProfileRepository,
              };
              use liaison_vault_markdown::MarkdownVault;
              use liaison_workspace::{BuildProfile, InitialiseWorkspace, WorkspaceProfile};
              use std::{collections::BTreeSet, error::Error, fs};
              use tempfile::tempdir;

              #[test]
              fn profile_values_round_trip_without_editing_the_person_record(
              ) -> Result<(), Box<dyn Error>> {
                  let directory = tempdir()?;
                  let workspace = directory.path().join("workspace");
                  InitialiseWorkspace::new(MarkdownVault::new()).execute(
                      &workspace,
                      "Fixture",
                      WorkspaceProfile::Personal,
                      BuildProfile::Airgap,
                      "en-IE",
                  )?;
                  let person = CreatePerson::new(MarkdownVault::new()).execute(
                      &workspace,
                      "Alex Example",
                      Some("alex@example.test".to_owned()),
                  )?;
                  let person_path = fs::read_dir(workspace.join("people"))?
                      .filter_map(Result::ok)
                      .map(|entry| entry.path())
                      .next()
                      .ok_or("person record was not created")?;
                  let original_person = fs::read_to_string(&person_path)?;

                  let definition = FieldDefinition::new(FieldDefinitionSpec {
                      id: FieldId::parse("identity.preferred_channel")?,
                      label: "Preferred channel".to_owned(),
                      field_type: FieldType::ShortText,
                      classification: Classification::Private,
                      required_for: BTreeSet::new(),
                      stale_after_days: None,
                      sealed_by_default: false,
                  })?;
                  let value = FieldValue::new(
                      &definition,
                      InformationState::Known,
                      Some("email".to_owned()),
                      false,
                  )?;
                  let mut record = ProfileRecord::new(person.id);
                  MarkdownProfileStore::new().save(&workspace, &record, None)?;
                  let expected = record.revision();
                  record.set_value(value)?;
                  MarkdownProfileStore::new().save(&workspace, &record, Some(expected))?;
                  let loaded = MarkdownProfileStore::new().load(&workspace, person.id)?;

                  assert_eq!(loaded, record);
                  assert_eq!(fs::read_to_string(person_path)?, original_person);
                  assert!(workspace.join("profiles").join(format!("{}.yaml", person.id)).is_file());
                  Ok(())
              }
          }
          EOF
      - name: Format, resolve, and validate
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo generate-lockfile
          cargo check -p liaison-profiles -p liaison-profile-store-markdown --all-targets --all-features --locked
          cargo clippy -p liaison-profiles -p liaison-profile-store-markdown --all-targets --all-features --locked -- -D warnings
          cargo test -p liaison-profiles -p liaison-profile-store-markdown --all-features --locked
          python scripts/check_architecture.py
      - name: Remove staging files and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f contexts/profiles/src/lib.include contexts/profiles/src/lib.new.rs contexts/profiles/src/persistence_export.rs
          rm -f .bootstrap/profile-persistence-trigger
          rm .github/workflows/apply-profile-persistence-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: add revisioned profile value persistence"
          git push origin HEAD:agent/r3-profile-values-persistence
