name: Apply relationship runtime formatting once

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [agent/r1-rust-ddd-cli-v3]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/r2-profiles-reason-review'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r2-profiles-reason-review
          fetch-depth: 0
      - name: Apply deterministic source corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          review = Path('contexts/review-attention/src/lib.rs')
          text = review.read_text(encoding='utf-8')
          text = text.replace('pub const fn is_active(&self, as_of: NaiveDate) -> bool', 'pub fn is_active(&self, as_of: NaiveDate) -> bool')
          review.write_text(text, encoding='utf-8')

          profiles = Path('contexts/profiles/src/lib.rs')
          text = profiles.read_text(encoding='utf-8')
          text = text.replace(
              '''PurposeId::parse("meeting_brief").unwrap_or_else(|error| {\n                unreachable!("fixture purpose ID should be valid: {error}")\n            })''',
              '''{\n                let parsed = PurposeId::parse("meeting_brief");\n                assert!(parsed.is_ok());\n                let Ok(value) = parsed else { return; };\n                value\n            }''',
          )
          text = text.replace(
              '''TopicPackId::parse("pets").unwrap_or_else(|error| {\n                unreachable!("fixture pack ID should be valid: {error}")\n            })''',
              '''{\n                let parsed = TopicPackId::parse("pets");\n                assert!(parsed.is_ok());\n                let Ok(value) = parsed else { return; };\n                value\n            }''',
          )
          profiles.write_text(text, encoding='utf-8')
          PY
          cargo generate-lockfile
          cargo fmt --all
          rm .github/workflows/apply-relationship-runtime-format-once.yml
      - name: Commit deterministic outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: format relationship contexts and refresh lockfile"
          git push origin HEAD:agent/r2-profiles-reason-review
