name: Localization

on:
  pull_request:
    paths:
      - "docs/standards/localization-and-language-quality.md"
      - "docs/knowledge/KCS-0006-how-do-i-add-or-change-a-localized-string.md"
      - "docs/evidence/localization/**"
      - "examples/locales/**"
      - "schemas/locale-catalog.schema.json"
      - "spec/localization-requirements.json"
      - "scripts/check_localization.py"
      - ".github/workflows/localization.yml"
  push:
    branches: [main]
    paths:
      - "docs/standards/localization-and-language-quality.md"
      - "docs/knowledge/KCS-0006-how-do-i-add-or-change-a-localized-string.md"
      - "docs/evidence/localization/**"
      - "examples/locales/**"
      - "schemas/locale-catalog.schema.json"
      - "spec/localization-requirements.json"
      - "scripts/check_localization.py"
      - ".github/workflows/localization.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check jsonschema==4.25.1
      - run: python scripts/check_localization.py
      - run: python scripts/check_repository.py
