name: Refresh context after desktop merge

on:
  push:
    branches: [docs-repository-context]
    paths:
      - ".github/workflows/refresh-context-after-desktop-merge.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-repository-context
          fetch-depth: 0
      - name: Update current-state text
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace(
              '> **Status: pre-alpha.** The repository contains a reviewed product specification, interaction prototype, Rust domain foundations, Markdown/CLI vertical slices, and provider-contract work. It is not yet ready for daily use or public binary distribution. Do not describe planned features as implemented.',
              '> **Status: pre-alpha.** The default branch contains reviewed product and interaction specifications, Rust/CLI/Markdown/provider/profile/review foundations, and a native Tauri desktop alpha. It is not yet ready for daily use or public binary distribution. Do not describe planned features as implemented.',
              1,
          )
          text = text.replace(
              '- PR #8 contains the native Tauri/macOS alpha and tested review bundles; public signing, notarisation, clean-Mac UAT, and supported distribution remain closed;',
              '- PR #8 merged the native Tauri/macOS alpha and tested review bundles into `main`; public signing, notarisation, clean-Mac UAT, and supported distribution remain closed;',
              1,
          )
          readme.write_text(text, encoding='utf-8')

          context = Path('PROJECT_CONTEXT.md')
          text = context.read_text(encoding='utf-8')
          text = text.replace(
              'The default branch contains governance, product and interaction specifications, machine-readable planning, the Rust Workspace/People/CLI and Markdown slice, provider-neutral Connections, Topic Pack contracts, purpose-specific profile readiness, and reason-only Review and Attention runtime foundations. It does not yet have a supported public release.',
              'The default branch contains governance, product and interaction specifications, machine-readable planning, the Rust Workspace/People/CLI and Markdown slice, provider-neutral Connections, Topic Pack contracts, purpose-specific profile readiness, reason-only Review and Attention runtime foundations, and a native Tauri desktop alpha with universal macOS review bundles. It does not yet have a supported public release.',
              1,
          )
          old = '''| `main` | Governance, product and interaction specification, CLI/Markdown slice, Connections, Topic Pack contract, Profiles and reason-only Review runtime | Implemented on the default branch; no supported public release |
          | 8 | Native Tauri/macOS alpha and architecture-specific review bundles | Open and ready for review; Developer ID signing, notarisation, clean-Mac UAT, and supported distribution remain closed |
          '''
          new = '''| `main` | Governance, product and interaction specification, CLI/Markdown slice, Connections, Topic Pack contract, Profiles, reason-only Review runtime, and native Tauri desktop alpha | Implemented on the default branch; pre-alpha with no supported public release |
          | 8 | Native Tauri/macOS alpha and universal review bundles | Merged on 2026-07-18; Developer ID signing, notarisation, clean-Mac UAT, and supported distribution remain closed |
          '''
          if old not in text:
              raise SystemExit('current review table does not match expected state')
          context.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm .github/workflows/refresh-context-after-desktop-merge.yml
      - name: Commit status refresh
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: reflect the merged desktop alpha"
          git push origin HEAD:docs-repository-context
