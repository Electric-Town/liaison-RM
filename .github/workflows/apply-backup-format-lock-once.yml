name: Apply backup formatting and lockfile once

on:
  push:
    branches: [agent/r1-workspace-backup-restore-20260718]
    paths:
      - ".github/workflows/apply-backup-format-lock-once.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'agent/r1-workspace-backup-restore-20260718'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r1-workspace-backup-restore-20260718
          fetch-depth: 0
      - name: Format source and refresh lockfile
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo generate-lockfile
          rm .github/workflows/apply-backup-format-lock-once.yml
      - name: Validate staged source
        run: |
          set -euo pipefail
          cargo check -p liaison-workspace -p liaison-backup-local -p liaison-cli --all-targets --all-features --locked
          cargo clippy -p liaison-workspace -p liaison-backup-local -p liaison-cli --all-targets --all-features --locked -- -D warnings
          cargo test -p liaison-workspace -p liaison-backup-local -p liaison-cli --all-features --locked
      - name: Commit deterministic outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: format backup source and refresh lockfile"
          git push origin HEAD:agent/r1-workspace-backup-restore-20260718
