name: Diagnose P03 bootstrap

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feat/p03-recoverable-canonical-operations'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p03-recoverable-canonical-operations
          fetch-depth: 0
      - name: Inspect chunks without exposing payload
        shell: bash
        run: |
          set +e
          {
            echo "files:"
            find .bootstrap/p03 -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
            cat .bootstrap/p03/part-* | tr -d '\r\n' > /tmp/p03-encoded.txt
            echo "encoded bytes: $(wc -c < /tmp/p03-encoded.txt)"
            echo "encoded sha256: $(sha256sum /tmp/p03-encoded.txt | cut -d' ' -f1)"
            python3 - <<'PY'
          import base64, gzip, hashlib
          from pathlib import Path
          encoded = Path('/tmp/p03-encoded.txt').read_text(encoding='utf-8')
          compressed = base64.b64decode(encoded, validate=True)
          print(f'base64 valid: true')
          print(f'compressed bytes: {len(compressed)}')
          print(f'compressed sha256: {hashlib.sha256(compressed).hexdigest()}')
          patch = gzip.decompress(compressed)
          print(f'gzip valid: true')
          print(f'patch bytes: {len(patch)}')
          print(f'patch sha256: {hashlib.sha256(patch).hexdigest()}')
          PY
            echo "diagnostic exit: $?"
          } > p03-bootstrap-diagnostics.txt 2>&1
          cat p03-bootstrap-diagnostics.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p03-bootstrap-diagnostics
          path: p03-bootstrap-diagnostics.txt
          retention-days: 1
