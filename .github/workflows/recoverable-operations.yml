name: Recoverable canonical operations

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "contexts/workspace/**"
      - "contexts/people/**"
      - "crates/liaison-application/**"
      - "crates/liaison-shared-kernel/**"
      - "adapters/vault-markdown/**"
      - ".github/workflows/recoverable-operations.yml"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "contexts/workspace/**"
      - "contexts/people/**"
      - "crates/liaison-application/**"
      - "crates/liaison-shared-kernel/**"
      - "adapters/vault-markdown/**"
      - ".github/workflows/recoverable-operations.yml"

permissions:
  contents: write

jobs:
  source-correction:
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/p03-recoverable-canonical-operations'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p03-recoverable-canonical-operations
          fetch-depth: 0
      - name: Apply reviewed P03 corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          lib = Path('adapters/vault-markdown/src/lib.rs')
          text = lib.read_text(encoding='utf-8')
          old = '''                let current = bound_find_person(root, person.id)
                    .ok()
                    .map(|(_, parsed)| parsed.document.revision.get())
                    .unwrap_or(expected_revision.get());'''
          new = '''                let current = bound_find_person(root, person.id)
                    .ok()
                    .map_or(expected_revision.get(), |(_, parsed)| {
                        parsed.document.revision.get()
                    });'''
          if old not in text:
              raise SystemExit('expected Person revision fallback pattern was not found')
          lib.write_text(text.replace(old, new, 1), encoding='utf-8')

          operations = Path('adapters/vault-markdown/src/operations.rs')
          text = operations.read_text(encoding='utf-8')
          marker = '''    let projections = root
        .open_dir_nofollow(".liaison/projections")
        .map_err(|error| map_io("open projection directory", error).with_operation(operation_id))?;
    let bytes = format!("operation_id: {operation_id}\\n").into_bytes();'''
          replacement = '''    let projections = root
        .open_dir_nofollow(".liaison/projections")
        .map_err(|error| map_io("open projection directory", error).with_operation(operation_id))?;
    // A pre-existing regular marker already proves every projection is stale.
    // Keeping it avoids a platform-dependent replacement and any interval in
    // which the stale evidence disappears between committed operations.
    if file_exists(&projections, "stale")? {
        return Ok(());
    }
    let bytes = format!("operation_id: {operation_id}\\n").into_bytes();'''
          if marker not in text:
              raise SystemExit('expected projection marker pattern was not found')
          operations.write_text(text.replace(marker, replacement, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/apply-p03-validation-fixes.yml
          cat > .github/workflows/recoverable-operations.yml <<'YAML'
          name: Recoverable canonical operations

          on:
            pull_request:
              paths:
                - "Cargo.toml"
                - "Cargo.lock"
                - "contexts/workspace/**"
                - "contexts/people/**"
                - "crates/liaison-application/**"
                - "crates/liaison-shared-kernel/**"
                - "adapters/vault-markdown/**"
                - ".github/workflows/recoverable-operations.yml"
            push:
              branches: [main]
              paths:
                - "Cargo.toml"
                - "Cargo.lock"
                - "contexts/workspace/**"
                - "contexts/people/**"
                - "crates/liaison-application/**"
                - "crates/liaison-shared-kernel/**"
                - "adapters/vault-markdown/**"
                - ".github/workflows/recoverable-operations.yml"

          permissions:
            contents: read

          jobs:
            operation-engine:
              name: Operation engine (${{ matrix.os }})
              strategy:
                fail-fast: false
                matrix:
                  os: [ubuntu-latest, macos-latest, windows-latest]
              runs-on: ${{ matrix.os }}
              steps:
                - uses: actions/checkout@v4
                - name: Show Rust toolchain
                  run: rustc --version --verbose
                - name: Check formatting
                  run: cargo fmt --all --check
                - name: Check operation packages
                  run: cargo check -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-targets --all-features --locked
                - name: Lint operation packages
                  run: cargo clippy -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-targets --all-features --locked -- -D warnings
                - name: Test operation packages
                  run: cargo test -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-features --locked

            repository-contracts:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                - run: python scripts/check_architecture.py
                - run: python scripts/check_repository.py
                - run: python scripts/check_spec.py
                - run: python scripts/generate_traceability.py --check
          YAML
          cargo fmt --all
      - name: Commit corrected ordinary source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(workspace): preserve stale projection evidence across operations"
          git push origin HEAD:feat/p03-recoverable-canonical-operations

  operation-engine:
    name: Operation engine (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Show Rust toolchain
        run: rustc --version --verbose
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check operation packages
        run: cargo check -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-targets --all-features --locked
      - name: Lint operation packages
        run: cargo clippy -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-targets --all-features --locked -- -D warnings
      - name: Test operation packages
        run: cargo test -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-features --locked

  repository-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_architecture.py
      - run: python scripts/check_repository.py
      - run: python scripts/check_spec.py
      - run: python scripts/generate_traceability.py --check
