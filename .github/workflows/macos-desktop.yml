name: macOS desktop alpha

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/desktop/**"
      - "adapters/vault-markdown/**"
      - "contexts/people/**"
      - "contexts/workspace/**"
      - "scripts/check_desktop_shell.py"
      - "scripts/test_desktop_ui.py"
      - "scripts/generate_desktop_assets.py"
      - ".github/workflows/macos-desktop.yml"
      - ".github/workflows/macos-release.yml"

permissions:
  contents: read

jobs:
  interface:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install browser-test dependencies
        run: |
          python -m pip install pillow==11.3.0 playwright==1.57.0
          python -m playwright install --with-deps chromium
      - name: Check shell boundaries
        run: python scripts/check_desktop_shell.py
      - name: Check JavaScript syntax
        run: node --check apps/desktop/ui/app.js
      - name: Verify generated icons
        run: python scripts/generate_desktop_assets.py --check
      - name: Run browser acceptance tests
        env:
          DESKTOP_SCREENSHOT_DIR: artifacts/desktop-screens
          DESKTOP_TEST_REPORT: artifacts/desktop-ui-report.json
        run: python scripts/test_desktop_ui.py
      - uses: actions/upload-artifact@v7
        with:
          name: liaison-desktop-interface-evidence
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Show toolchain
        run: rustc --version --verbose
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check desktop crate
        run: cargo check -p liaison-desktop --all-targets --all-features --locked
      - name: Lint desktop crate
        run: cargo clippy -p liaison-desktop --all-targets --all-features --locked -- -D warnings
      - name: Test desktop crate
        run: cargo test -p liaison-desktop --all-features --locked

  bundle:
    name: Universal macOS review bundle
    runs-on: macos-14
    needs: [interface, rust]
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
    steps:
      - uses: actions/checkout@v7
      - name: Install universal Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.8.4 --locked
      - name: Build universal application
        working-directory: apps/desktop
        run: cargo tauri build --target universal-apple-darwin --bundles app
      - name: Ad-hoc sign and verify application
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          mkdir -p artifacts/macos
          ditto -c -k --keepParent "$APP_PATH" artifacts/macos/Liaison-RM-universal-macos-app.zip
          hdiutil create -volname "Liaison RM" -srcfolder "$APP_PATH" -ov -format UDZO artifacts/macos/Liaison-RM-universal-macos.dmg
          hdiutil verify artifacts/macos/Liaison-RM-universal-macos.dmg
          shasum -a 256 artifacts/macos/* > artifacts/macos/SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: liaison-rm-universal-macos-review
          path: artifacts/macos/
          if-no-files-found: error
          retention-days: 14
