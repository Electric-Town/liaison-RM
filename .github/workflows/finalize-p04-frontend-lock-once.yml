name: Finalize P04 frontend lock once

on:
  push:
    branches: [feat/p04-typed-react-foundation]
    paths:
      - ".github/workflows/finalize-p04-frontend-lock-once.yml"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p04-typed-react-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Finalize typed source and deterministic dependency lock
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          config = Path("apps/desktop/ui-react/vite.config.ts")
          text = config.read_text(encoding="utf-8")
          text = text.replace('import { defineConfig } from "vite";', 'import { defineConfig } from "vitest/config";')
          config.write_text(text, encoding="utf-8")

          source = Path("apps/desktop/ui-react/src/application-contract.test.ts")
          target = Path("apps/desktop/ui-react/src/application-contract.test.tsx")
          text = source.read_text(encoding="utf-8")
          text = text.replace('.toBeInTheDocument()', '.not.toBeNull()')
          target.write_text(text, encoding="utf-8")
          source.unlink()
          PY
          cd apps/desktop/ui-react
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --ignore-scripts --no-audit --no-fund
          npm run typecheck
          npm run test
          npm run build
          cd ../../..
          python3 scripts/check_design_contract.py
          python3 scripts/check_frontend_contract.py
          git diff --check
      - name: Commit ordinary frontend source and lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/ui-react/package-lock.json \
            apps/desktop/ui-react/vite.config.ts \
            apps/desktop/ui-react/src/application-contract.test.ts \
            apps/desktop/ui-react/src/application-contract.test.tsx
          git diff --cached --check
          git commit -m "chore(p04): lock and validate the typed frontend toolchain"
          git push origin HEAD:feat/p04-typed-react-foundation
