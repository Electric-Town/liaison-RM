name: Apply Clippy fixes once

on:
  push:
    branches:
      - agent/r1-rust-ddd-cli-v3
    paths:
      - ".github/workflows/clippy-fix-once.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r1-rust-ddd-cli-v3
          fetch-depth: 0
      - name: Configure author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Apply machine-applicable lint fixes
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged
          cargo fmt --all
          rm .github/workflows/clippy-fix-once.yml
      - name: Commit deterministic results
        run: |
          git add -A
          git commit -m "chore: apply Rust lint fixes"
          git push origin HEAD:agent/r1-rust-ddd-cli-v3
