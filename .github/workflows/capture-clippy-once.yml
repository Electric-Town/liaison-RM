name: Capture Clippy diagnostics once

on:
  push:
    branches:
      - agent/r1-rust-ddd-cli-v3
    paths:
      - ".github/workflows/capture-clippy-once.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r1-rust-ddd-cli-v3
          fetch-depth: 0
      - name: Configure author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Capture diagnostics
        run: |
          mkdir -p .diagnostics
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings > .diagnostics/clippy.txt 2>&1 || true
          rm .github/workflows/capture-clippy-once.yml
      - name: Commit diagnostics
        run: |
          git add -A
          git commit -m "chore: capture Rust lint diagnostics"
          git push origin HEAD:agent/r1-rust-ddd-cli-v3
