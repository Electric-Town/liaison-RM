name: Apply desktop generated assets once

on:
  push:
    branches: [agent/r2-macos-desktop-alpha]
    paths:
      - ".github/workflows/apply-desktop-generated-assets-once.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r2-macos-desktop-alpha
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deterministic generators and browser
        run: |
          python -m pip install pillow==11.3.0 playwright==1.57.0
          python -m playwright install --with-deps chromium
      - name: Generate and verify review assets
        env:
          DESKTOP_SCREENSHOT_DIR: docs/evidence/macos/screenshots
          DESKTOP_TEST_REPORT: docs/evidence/macos/browser-test-report.json
        run: |
          python scripts/generate_desktop_assets.py
          python scripts/check_desktop_shell.py
          node --check apps/desktop/ui/app.js
          python scripts/test_desktop_ui.py
          python scripts/generate_desktop_assets.py --check
      - name: Resolve and format Rust workspace
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Remove one-shot workflow
        run: rm .github/workflows/apply-desktop-generated-assets-once.yml
      - name: Commit deterministic outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: generate desktop icons, screenshots, and lockfile"
          git push origin HEAD:agent/r2-macos-desktop-alpha
