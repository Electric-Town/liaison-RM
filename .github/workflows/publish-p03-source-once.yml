name: Publish P03 recoverable-operation source once

on:
  push:
    branches: [agent/p03-source-publisher-20260719]
    paths:
      - ".github/workflows/publish-p03-source-once.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'push' || github.head_ref == 'agent/p03-source-publisher-20260719'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p03-source-publisher-20260719
          fetch-depth: 0

      - name: Reconstruct and verify reviewed source patch
        shell: bash
        run: |
          set -euo pipefail
          cat .staging/p03/part-* | tr -d '\r\n' | base64 --decode > /tmp/p03-source.patch.gz
          echo "b5925f4553592513c8ef0a105b9a4d3c86f728b5839c6dbb2488937451fbe926  /tmp/p03-source.patch.gz" | sha256sum -c -
          gzip -dc /tmp/p03-source.patch.gz > /tmp/p03-source.patch
          echo "409d7d6247d40f66e47bd28a00e72e0882e2957cf749d61edb3aff2c3998ce8a  /tmp/p03-source.patch" | sha256sum -c -

      - name: Apply directly reviewable source to the product branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feat/p03-recoverable-operations
          git checkout -B feat/p03-recoverable-operations origin/feat/p03-recoverable-operations
          git apply --check /tmp/p03-source.patch
          git apply /tmp/p03-source.patch

      - name: Apply reviewed compile corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          cargo = Path("adapters/vault-markdown/Cargo.toml")
          text = cargo.read_text(encoding="utf-8")
          if "chrono.workspace = true" not in text.split("[dev-dependencies]", 1)[0]:
              text = text.replace(
                  "[dependencies]\ncap-fs-ext.workspace = true\n",
                  "[dependencies]\ncap-fs-ext.workspace = true\nchrono.workspace = true\n",
                  1,
              )
          text = text.replace("\n[dev-dependencies]\nchrono.workspace = true\n", "\n[dev-dependencies]\n", 1)
          cargo.write_text(text, encoding="utf-8")

          source = Path("adapters/vault-markdown/src/operations.rs")
          text = source.read_text(encoding="utf-8")
          call = "        let bytes = read_file(&staged, &staged_name(target.ordinal)).map_err(|error| {"
          if call not in text:
              raise SystemExit("expected staged-read call was not found")
          text = text.replace(
              call,
              "        let staged_filename = staged_name(target.ordinal);\n"
              "        let bytes = read_file(&staged, Path::new(&staged_filename)).map_err(|error| {",
              1,
          )
          mapping = '            map_io("read staged target", error)\n'
          if mapping not in text:
              raise SystemExit("expected staged-read error mapping was not found")
          text = text.replace(mapping, "            error\n", 1)
          source.write_text(text, encoding="utf-8")
          PY

      - name: Format, resolve, and validate the affected source
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo generate-lockfile
          python3 scripts/check_architecture.py
          python3 scripts/check_repository.py
          python3 scripts/check_spec.py
          python3 scripts/generate_traceability.py --check
          packages=(
            -p liaison-shared-kernel
            -p liaison-workspace
            -p liaison-vault-markdown
            -p liaison-application
          )
          cargo check "${packages[@]}" --all-targets --all-features --locked
          cargo clippy "${packages[@]}" --all-targets --all-features --locked -- -D warnings
          cargo test "${packages[@]}" --all-features --locked
          git diff --check

      - name: Commit ordinary source files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat(p03): add recoverable multi-target canonical operations"
          git push origin HEAD:feat/p03-recoverable-operations
