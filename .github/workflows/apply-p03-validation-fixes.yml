name: Apply P03 validation fix once

on:
  push:
    branches: [feat/p03-recoverable-canonical-operations]
    paths:
      - ".github/workflows/apply-p03-validation-fixes.yml"

permissions:
  contents: write

concurrency:
  group: apply-p03-validation-fix-once
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p03-recoverable-canonical-operations
          fetch-depth: 0
      - name: Preserve existing projection-stale evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("adapters/vault-markdown/src/operations.rs")
          text = path.read_text(encoding="utf-8")
          if 'if file_exists(&projections, "stale")?' not in text:
              old = '''    let projections = root
                  .open_dir_nofollow(".liaison/projections")
                  .map_err(|error| map_io("open projection directory", error).with_operation(operation_id))?;
              let bytes = format!("operation_id: {operation_id}\\n").into_bytes();'''
              new = '''    let projections = root
                  .open_dir_nofollow(".liaison/projections")
                  .map_err(|error| map_io("open projection directory", error).with_operation(operation_id))?;
              // A pre-existing regular marker already proves every projection is stale.
              // Retaining it avoids a platform-dependent replacement and any interval in
              // which stale evidence disappears between committed operations.
              if file_exists(&projections, "stale")? {
                  return Ok(());
              }
              let bytes = format!("operation_id: {operation_id}\\n").into_bytes();'''
              if old not in text:
                  raise SystemExit("expected projection-stale publication block was not found")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          cargo fmt --all
          rm .github/workflows/apply-p03-validation-fixes.yml
      - name: Commit ordinary source correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(workspace): retain projection-stale evidence across operations"
          git push origin HEAD:feat/p03-recoverable-canonical-operations
