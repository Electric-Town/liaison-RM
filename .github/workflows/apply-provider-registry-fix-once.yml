name: Apply provider registry fix once

on:
  push:
    branches: [agent/r1-provider-sdk-v4]
    paths:
      - ".github/workflows/apply-provider-registry-fix-once.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r1-provider-sdk-v4
          fetch-depth: 0
      - name: Patch the Connections application boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("contexts/connections/src/domain.rs")
          text = path.read_text(encoding="utf-8")
          marker = "\nfn valid_version_suffix(value: &str) -> bool {\n"
          addition = '''
          pub trait ProviderRegistry {
              fn register(&mut self, descriptor: ProviderDescriptor) -> Result<(), ProviderDomainError>;
              fn list(&self) -> Result<Vec<ProviderDescriptor>, ProviderDomainError>;
          }

          #[derive(Debug)]
          pub struct RegisterProvider<'a, Registry> {
              registry: &'a mut Registry,
          }

          impl<'a, Registry> RegisterProvider<'a, Registry>
          where
              Registry: ProviderRegistry,
          {
              #[must_use]
              pub const fn new(registry: &'a mut Registry) -> Self {
                  Self { registry }
              }

              pub fn execute(
                  &mut self,
                  descriptor: ProviderDescriptor,
              ) -> Result<(), ProviderDomainError> {
                  self.registry.register(descriptor)
              }
          }

          #[derive(Debug)]
          pub struct ListProviders<'a, Registry> {
              registry: &'a Registry,
          }

          impl<'a, Registry> ListProviders<'a, Registry>
          where
              Registry: ProviderRegistry,
          {
              #[must_use]
              pub const fn new(registry: &'a Registry) -> Self {
                  Self { registry }
              }

              pub fn execute(&self) -> Result<Vec<ProviderDescriptor>, ProviderDomainError> {
                  self.registry.list()
              }
          }
          '''
          if "pub trait ProviderRegistry" not in text:
              if marker not in text:
                  raise SystemExit("registry insertion marker is missing")
              text = text.replace(marker, "\n" + addition.strip() + marker, 1)
              path.write_text(text, encoding="utf-8")
          PY
          rm -f .bootstrap/provider-payload/fix.py.gz.b64
          rm -f .bootstrap/provider-repair/READY
          rm -f .bootstrap/provider-repair/direct-sources.tar.gz.b64
          rm -f .github/workflows/provider-check-diagnostics.yml
          rm .github/workflows/apply-provider-registry-fix-once.yml
          cargo fmt --all
      - name: Commit deterministic repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: restore provider registry application services"
          git push origin HEAD:agent/r1-provider-sdk-v4
