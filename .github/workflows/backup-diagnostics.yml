name: Backup diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/cli/**"
      - "adapters/backup-local/**"
      - "contexts/workspace/**"
      - ".github/workflows/backup-diagnostics.yml"

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/r1-workspace-backup-restore-v2'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Apply pending reviewed corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("adapters/backup-local/src/lib.rs")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "let mut buffer = [0_u8; 64 * 1024];",
              "let mut buffer = vec![0_u8; 64 * 1024];",
          )
          text = text.replace(
              "fn storage(action: &str, error: std::io::Error) -> BackupError {",
              "fn storage(action: &str, error: &std::io::Error) -> BackupError {",
          )
          text = re.sub(
              r'storage\(("[^"]+"), error\)',
              r'storage(\1, &error)',
              text,
          )
          text = text.replace('b"tampered\\n"', 'b"changed\\n"')
          path.write_text(text, encoding="utf-8")
          PY
      - name: Generate formatted diagnostic workspace
        run: |
          cargo fmt --all
          cargo generate-lockfile
      - name: Capture check output
        shell: bash
        run: |
          set +e
          cargo check -p liaison-workspace -p liaison-backup-local -p liaison-cli --all-targets --all-features --locked > backup-check.log 2>&1
          echo $? > backup-check.status
          exit 0
      - name: Capture Clippy output
        shell: bash
        run: |
          set +e
          cargo clippy -p liaison-workspace -p liaison-backup-local -p liaison-cli --all-targets --all-features --locked -- -D warnings > backup-clippy.log 2>&1
          echo $? > backup-clippy.status
          exit 0
      - name: Capture test output
        shell: bash
        run: |
          set +e
          cargo test -p liaison-workspace -p liaison-backup-local -p liaison-cli --all-features --locked > backup-test.log 2>&1
          echo $? > backup-test.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: backup-diagnostics-after-fix
          path: |
            backup-check.log
            backup-check.status
            backup-clippy.log
            backup-clippy.status
            backup-test.log
            backup-test.status
          if-no-files-found: error
          retention-days: 3
