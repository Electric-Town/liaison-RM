name: Repository context diagnostics

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_CONTEXT.md"
      - "AGENTS.md"
      - "AI_BUILD_INSTRUCTIONS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - ".github/copilot-instructions.md"
      - "docs/**"
      - "CHANGELOG.md"
      - ".github/workflows/repository-context-diagnostics.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Capture repository policy output
        run: |
          set +e
          python scripts/check_repository.py > repository-policy.log 2>&1
          echo "$?" > repository-policy.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: repository-context-diagnostics
          path: |
            repository-policy.log
            repository-policy.status
          if-no-files-found: error
          retention-days: 3
