name: Diagnose P03 Windows tests once

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-p03-windows.yml"
      - "crates/liaison-application/tests/windows_operation_diagnostic.rs"

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/p03-post-merge-hardening'
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Capture the first canonical mutation state
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          cargo test -p liaison-application --test windows_operation_diagnostic --all-features --locked -- --nocapture *> diagnostics/p03-windows-tests.txt
          $status = $LASTEXITCODE
          Set-Content -Path diagnostics/status.txt -Value $status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: p03-windows-test-diagnostics
          path: diagnostics
          if-no-files-found: error
          retention-days: 1
