name: Publish initial Liaison RM PR stack

on:
  push:
    branches:
      - agent/publish-initial-stack-20260717
    paths:
      - .bootstrap/initial-stack/READY
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: liaison-initial-pr-stack
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'push' || github.head_ref == 'agent/publish-initial-stack-20260717'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out bootstrap branch
        uses: actions/checkout@v4
        with:
          ref: agent/publish-initial-stack-20260717
          fetch-depth: 0

      - name: Reconstruct reviewed source payload
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/initial-stack/part-* > /tmp/liaison-pr-publish.tar.gz.b64
          sha256sum /tmp/liaison-pr-publish.tar.gz.b64
          base64 --decode /tmp/liaison-pr-publish.tar.gz.b64 > /tmp/liaison-pr-publish.tar.gz
          tar -tzf /tmp/liaison-pr-publish.tar.gz > /tmp/liaison-payload-files.txt
          head -100 /tmp/liaison-payload-files.txt
          tar -xzf /tmp/liaison-pr-publish.tar.gz -C /tmp

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.97.1
          rustc --version
          cargo --version

      - name: Validate every stacked snapshot
        shell: bash
        run: bash /tmp/liaison-pr-publish/scripts/validate.sh

      - name: Publish review branches
        shell: bash
        run: bash /tmp/liaison-pr-publish/scripts/publish.sh "$GITHUB_WORKSPACE"
