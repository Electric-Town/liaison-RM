name: Materialize hand-drawn CRM source once

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'feat/handdrawn-crm-baseline'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/handdrawn-crm-baseline
          fetch-depth: 0
      - name: Reconstruct and inspect the reviewed source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .github/.handdrawn-payload/part* | tr -d '\r\n' | base64 --decode > /tmp/handdrawn-crm-source.tar.gz
          gzip -t /tmp/handdrawn-crm-source.tar.gz
          if tar -tzf /tmp/handdrawn-crm-source.tar.gz | grep -E '(^/|(^|/)\.\.(/|$))'; then
            echo 'unsafe archive path' >&2
            exit 1
          fi
          tar -tzf /tmp/handdrawn-crm-source.tar.gz
      - name: Replace staging data with directly reviewable source
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/handdrawn-crm-source.tar.gz -C "$GITHUB_WORKSPACE"
          rm -rf .github/.handdrawn-payload
          rm -f .github/workflows/export-worktree-once.yml
          rm .github/workflows/materialize-handdrawn-source-once.yml
      - name: Format Rust and refresh the exact lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo generate-lockfile
      - name: Validate that only usable source remains
        shell: bash
        run: |
          set -euo pipefail
          test ! -e .github/.handdrawn-payload
          test ! -e .github/workflows/export-worktree-once.yml
          python scripts/check_architecture.py
          python scripts/check_repository.py
          python scripts/check_spec.py
          node --check apps/desktop/ui/app.js
          git diff --check
      - name: Commit the materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat: materialize personal CRM baseline and hand-drawn desktop source'
          git push origin HEAD:feat/handdrawn-crm-baseline
