name: Diagnose P03 validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/p03-source-publisher-20260719'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p03-source-publisher-20260719
          fetch-depth: 0
      - name: Reconstruct, apply, and correct source
        shell: bash
        run: |
          set -euo pipefail
          cat .staging/p03/part-* | tr -d '\r\n' | base64 --decode > /tmp/p03-source.patch.gz
          gzip -dc /tmp/p03-source.patch.gz > /tmp/p03-source.patch
          git fetch origin feat/p03-recoverable-operations
          git checkout -B feat/p03-recoverable-operations origin/feat/p03-recoverable-operations
          git apply /tmp/p03-source.patch
          python3 - <<'PY'
          from pathlib import Path

          cargo = Path("adapters/vault-markdown/Cargo.toml")
          text = cargo.read_text(encoding="utf-8")
          if "chrono.workspace = true" not in text.split("[dev-dependencies]", 1)[0]:
              text = text.replace(
                  "[dependencies]\ncap-fs-ext.workspace = true\n",
                  "[dependencies]\ncap-fs-ext.workspace = true\nchrono.workspace = true\n",
                  1,
              )
          text = text.replace("\n[dev-dependencies]\nchrono.workspace = true\n", "\n[dev-dependencies]\n", 1)
          cargo.write_text(text, encoding="utf-8")

          source = Path("adapters/vault-markdown/src/operations.rs")
          text = source.read_text(encoding="utf-8")
          text = text.replace(
              "        let bytes = read_file(&staged, &staged_name(target.ordinal)).map_err(|error| {",
              "        let staged_filename = staged_name(target.ordinal);\n"
              "        let bytes = read_file(&staged, Path::new(&staged_filename)).map_err(|error| {",
              1,
          )
          text = text.replace('            map_io("read staged target", error)\n', "            error\n", 1)
          source.write_text(text, encoding="utf-8")
          PY
          cargo fmt --all
          cargo generate-lockfile
      - name: Capture affected-package validation outputs
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/p03-validation
          run_check() {
            name="$1"
            shift
            echo "$*" > "/tmp/p03-validation/${name}.command"
            "$@" > "/tmp/p03-validation/${name}.log" 2>&1
            echo "$?" > "/tmp/p03-validation/${name}.status"
          }
          run_check architecture python3 scripts/check_architecture.py
          run_check repository python3 scripts/check_repository.py
          run_check spec python3 scripts/check_spec.py
          run_check traceability python3 scripts/generate_traceability.py --check
          run_check cargo-check cargo check -p liaison-shared-kernel -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-targets --all-features --locked
          run_check cargo-clippy cargo clippy -p liaison-shared-kernel -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-targets --all-features --locked -- -D warnings
          run_check cargo-test cargo test -p liaison-shared-kernel -p liaison-workspace -p liaison-vault-markdown -p liaison-application --all-features --locked
          git diff --check > /tmp/p03-validation/git-diff.log 2>&1
          echo "$?" > /tmp/p03-validation/git-diff.status
          git diff --stat > /tmp/p03-validation/diff-stat.txt
      - uses: actions/upload-artifact@v4
        with:
          name: p03-validation-diagnostics
          path: /tmp/p03-validation
          if-no-files-found: error
          retention-days: 1
