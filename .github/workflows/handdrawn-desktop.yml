name: Hand-drawn desktop interface

on:
  pull_request:
    paths:
      - "apps/desktop/ui/**"
      - "apps/desktop/README.md"
      - "scripts/check_desktop_shell.py"
      - "scripts/test_desktop_ui.py"
      - "docs/knowledge/KCS-0007-how-do-i-use-the-hand-drawn-desktop-system.md"
      - ".github/workflows/handdrawn-desktop.yml"
  push:
    branches: [main]
    paths:
      - "apps/desktop/ui/**"
      - "apps/desktop/README.md"
      - "scripts/check_desktop_shell.py"
      - "scripts/test_desktop_ui.py"
      - ".github/workflows/handdrawn-desktop.yml"

permissions:
  contents: read

jobs:
  interface:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install browser test dependencies
        run: |
          python -m pip install playwright==1.57.0
          python -m playwright install --with-deps chromium
      - name: Validate static interface
        run: |
          node --check apps/desktop/ui/app.js
          python scripts/check_desktop_shell.py
          DESKTOP_SCREENSHOT_DIR=artifacts/handdrawn DESKTOP_TEST_REPORT=artifacts/handdrawn-report.json python scripts/test_desktop_ui.py
      - uses: actions/upload-artifact@v4
        with:
          name: handdrawn-interface-evidence
          path: artifacts/
          if-no-files-found: error
