name: Repository context diagnostics

on:
  push:
    branches: [docs-repository-context]
    paths:
      - ".github/workflows/context-diagnostics.yml"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Capture repository policy output
        shell: bash
        run: |
          set +e
          python scripts/check_repository.py > /tmp/context-policy.log 2>&1
          status=$?
          python - <<'PY' >> /tmp/context-policy.log
          import re
          from pathlib import Path

          seen = {}
          for path in [Path('README.md'), Path('PROJECT_CONTEXT.md')]:
              text = path.read_text(encoding='utf-8')
              paragraphs = [
                  re.sub(r'\s+', ' ', item.strip()).lower()
                  for item in re.split(r'\n\s*\n', text)
                  if len(item.strip()) >= 180 and not item.lstrip().startswith('```')
              ]
              for paragraph in paragraphs:
                  if paragraph in seen:
                      print('\nExact duplicate paragraph:')
                      print(paragraph)
                  else:
                      seen[paragraph] = path
          PY
          {
            echo "### Repository context diagnostics"
            echo
            echo '```text'
            cat /tmp/context-policy.log
            echo '```'
            echo
            echo "Exit status: $status"
          } > /tmp/comment.md
          exit 0
      - name: Post diagnostics to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 18 --body-file /tmp/comment.md
