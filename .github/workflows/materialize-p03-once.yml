name: Materialize P03 recoverable operations once

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: materialize-p03-recoverable-operations
  cancel-in-progress: true

jobs:
  materialize:
    if: github.head_ref == 'feat/p03-recoverable-canonical-operations'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p03-recoverable-canonical-operations
          fetch-depth: 0

      - name: Reconstruct and verify reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/p03/part-* | tr -d '\r\n' | base64 --decode > /tmp/p03-source.patch.gz
          echo "b5925f4553592513c8ef0a105b9a4d3c86f728b5839c6dbb2488937451fbe926  /tmp/p03-source.patch.gz" | sha256sum -c -
          gzip -t /tmp/p03-source.patch.gz
          gzip -dc /tmp/p03-source.patch.gz > /tmp/p03-source.patch
          git apply --check /tmp/p03-source.patch

      - name: Apply directly reviewable P03 source
        shell: bash
        run: |
          set -euo pipefail
          git apply --whitespace=fix /tmp/p03-source.patch
          rm -rf .bootstrap/p03
          rm -f .github/workflows/diagnose-p03-bootstrap.yml
          rm .github/workflows/materialize-p03-once.yml

      - name: Format, lock, and validate source structure
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo generate-lockfile
          python3 scripts/check_architecture.py
          python3 scripts/check_repository.py
          python3 scripts/check_spec.py
          python3 scripts/check_providers.py
          python3 scripts/check_wit_contract.py
          python3 scripts/check_workspace_manifest.py
          python3 scripts/check_desktop_shell.py
          python3 scripts/check_localization.py
          python3 scripts/check_relationship_model.py
          python3 scripts/check_public_site.py
          python3 scripts/generate_traceability.py --check
          node --check apps/desktop/ui/app.js
          git diff --check
          test ! -e .bootstrap/p03
          test ! -e .github/workflows/materialize-p03-once.yml
          test ! -e .github/workflows/diagnose-p03-bootstrap.yml

      - name: Commit ordinary source files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat(workspace): add recoverable canonical operations"
          git fetch origin feat/p03-recoverable-canonical-operations
          test "$(git rev-parse HEAD^)" = "$(git rev-parse origin/feat/p03-recoverable-canonical-operations)"
          git push origin HEAD:feat/p03-recoverable-canonical-operations
