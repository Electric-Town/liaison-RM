<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">Reason-only relationship review</title>
<desc id="desc">Desktop review queue showing a small capacity-bound set of people, factual reasons, suppressions, and actions without a relationship strength score.</desc>
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif}.h{fill:#172033;font-weight:800}.m{fill:#5d687b}.card{fill:#fff;stroke:#d7deea}.nav{fill:#17233d}.pill{font-size:12px;font-weight:700}</style>
<rect width="1200" height="800" fill="#f4f6fb"/><rect class="nav" width="220" height="800"/><rect x="220" width="980" height="64" fill="#fff" stroke="#d7deea"/>
<rect x="18" y="16" width="38" height="38" rx="10" fill="#dfe7ff"/><text x="37" y="41" text-anchor="middle" font-weight="800" fill="#243f92">LR</text><text x="68" y="34" font-size="17" font-weight="800" fill="#fff">Liaison RM</text><text x="68" y="51" font-size="12" fill="#c7d2ed">Reason-only review</text>
<rect x="14" y="88" width="192" height="42" rx="8" fill="#344a7a"/><rect x="14" y="88" width="4" height="42" rx="2" fill="#a9bcff"/><text x="34" y="115" fill="#fff" font-weight="700">Review</text><text x="34" y="165" fill="#fff">People</text><text x="34" y="215" fill="#fff">Topics</text><text x="34" y="265" fill="#fff">Policies</text>
<rect x="14" y="696" width="192" height="88" rx="8" fill="#263451" stroke="#5a6680"/><text x="28" y="724" fill="#fff" font-weight="700">Low capacity</text><text x="28" y="746" fill="#dbe3f5" font-size="12">3 people maximum</text><text x="28" y="766" fill="#dbe3f5" font-size="12">No overdue total shown</text>
<text x="248" y="104" class="h" font-size="30">Today’s review</text><text x="248" y="132" class="m" font-size="14">Three people, selected by visible reasons. No relationship strength is calculated.</text>
<rect x="248" y="154" width="924" height="52" rx="10" fill="#e7edff" stroke="#bac8ed"/><text x="266" y="177" class="h" font-size="14">Why these people?</text><text x="266" y="196" class="m" font-size="13">Open commitments and upcoming dates. Archived, paused, snoozed, and do-not-contact relationships are suppressed.</text>
<rect class="card" x="248" y="226" width="610" height="168" rx="12"/><circle cx="286" cy="266" r="24" fill="#e7edff"/><text x="286" y="272" text-anchor="middle" font-weight="800" fill="#29449a">AM</text><text x="322" y="261" class="h" font-size="19">Alex Murphy</text><text x="322" y="283" class="m" font-size="13">Last meaningful topic: moving into a new role</text>
<text x="266" y="320" class="h" font-size="13">Why now</text><rect x="266" y="334" width="142" height="28" rx="14" fill="#fff0d7"/><text x="337" y="353" text-anchor="middle" fill="#8a4b00" class="pill">Open commitment</text><rect x="418" y="334" width="136" height="28" rx="14" fill="#e7edff"/><text x="486" y="353" text-anchor="middle" fill="#243f92" class="pill">Birthday in 11 days</text><rect x="570" y="326" width="94" height="38" rx="8" fill="#3157c8"/><text x="617" y="350" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Open</text><rect x="674" y="326" width="80" height="38" rx="8" fill="#fff" stroke="#aeb9ca"/><text x="714" y="350" text-anchor="middle" class="h" font-size="13">Snooze</text>
<rect class="card" x="248" y="410" width="610" height="142" rx="12"/><circle cx="286" cy="450" r="24" fill="#e5f7ef"/><text x="286" y="456" text-anchor="middle" font-weight="800" fill="#086b49">RP</text><text x="322" y="445" class="h" font-size="19">Ravi Patel</text><text x="322" y="467" class="m" font-size="13">Quarterly cadence; last meaningful interaction 96 days ago</text><rect x="266" y="494" width="228" height="28" rx="14" fill="#fff0d7"/><text x="380" y="513" text-anchor="middle" fill="#8a4b00" class="pill">Due relative to own cadence</text><rect x="570" y="486" width="94" height="38" rx="8" fill="#3157c8"/><text x="617" y="510" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Open</text><rect x="674" y="486" width="80" height="38" rx="8" fill="#fff" stroke="#aeb9ca"/><text x="714" y="510" text-anchor="middle" class="h" font-size="13">Pause</text>
<rect class="card" x="248" y="568" width="610" height="116" rx="12"/><circle cx="286" cy="608" r="24" fill="#edf0f5"/><text x="286" y="614" text-anchor="middle" font-weight="800" fill="#465266">LC</text><text x="322" y="603" class="h" font-size="19">Leah Chen</text><text x="322" y="625" class="m" font-size="13">Pinned manually for a follow-up after the next interaction</text><rect x="266" y="642" width="106" height="26" rx="13" fill="#edf0f5"/><text x="319" y="660" text-anchor="middle" fill="#465266" class="pill">Manual pin</text><rect x="570" y="630" width="94" height="38" rx="8" fill="#3157c8"/><text x="617" y="654" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Open</text>
<rect class="card" x="880" y="226" width="292" height="296" rx="12"/><text x="900" y="258" class="h" font-size="20">Session settings</text><text x="900" y="296" class="m" font-size="13">Capacity</text><text x="1128" y="296" text-anchor="end" class="h" font-size="14">3 people</text><line x1="900" y1="310" x2="1150" y2="310" stroke="#e7ebf2"/><text x="900" y="342" class="m" font-size="13">Social capacity</text><text x="1128" y="342" text-anchor="end" class="h" font-size="14">Low</text><line x1="900" y1="356" x2="1150" y2="356" stroke="#e7ebf2"/><text x="900" y="388" class="m" font-size="13">Policy</text><text x="1128" y="388" text-anchor="end" class="h" font-size="14">Calm daily review</text><line x1="900" y1="402" x2="1150" y2="402" stroke="#e7ebf2"/><text x="900" y="434" class="m" font-size="13">Priority number</text><text x="1128" y="434" text-anchor="end" fill="#086b49" font-size="14" font-weight="700">Hidden</text><rect x="900" y="462" width="250" height="42" rx="8" fill="#fff" stroke="#aeb9ca"/><text x="1025" y="488" text-anchor="middle" class="h" font-size="13">Change review settings</text>
<rect x="880" y="540" width="292" height="144" rx="12" fill="#e5f7ef" stroke="#aad9c9"/><text x="900" y="572" fill="#064b35" font-size="16" font-weight="800">Valid actions</text><text x="900" y="600" fill="#086b49" font-size="13">Open · Log interaction · Complete</text><text x="900" y="624" fill="#086b49" font-size="13">Snooze · Pause · Skip · Archive</text><text x="900" y="656" fill="#086b49" font-size="12">Skipping does not lower a score.</text>
</svg>
