<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
<title id="title">Mobile low-capacity relationship review</title>
<desc id="desc">Mobile reason-only review showing one person at a time, two factual reasons, and accessible actions for open, complete, snooze, and skip.</desc>
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif}.h{fill:#172033;font-weight:800}.m{fill:#5d687b}.card{fill:#fff;stroke:#d7deea}.pill{font-size:11px;font-weight:700}</style>
<rect width="390" height="844" fill="#f4f6fb"/><rect width="390" height="64" fill="#fff" stroke="#d7deea"/><rect x="14" y="12" width="40" height="40" rx="11" fill="#dfe7ff"/><text x="34" y="38" text-anchor="middle" font-weight="800" fill="#243f92">LR</text><text x="66" y="29" class="h" font-size="16">Liaison RM</text><text x="66" y="47" class="m" font-size="11">Low-capacity review · 1 of 3</text>
<text x="18" y="100" class="h" font-size="25">Why Alex, now?</text><text x="18" y="126" class="m" font-size="13">Only factual reasons are shown.</text>
<rect x="18" y="146" width="354" height="476" rx="16" class="card"/><circle cx="195" cy="210" r="42" fill="#e7edff"/><text x="195" y="220" text-anchor="middle" font-weight="800" font-size="24" fill="#29449a">AM</text><text x="195" y="278" text-anchor="middle" class="h" font-size="23">Alex Murphy</text><text x="195" y="302" text-anchor="middle" class="m" font-size="12">Last meaningful topic: moving into a new role</text>
<text x="38" y="350" class="h" font-size="14">Why now</text><rect x="38" y="366" width="150" height="32" rx="16" fill="#fff0d7"/><text x="113" y="387" text-anchor="middle" fill="#8a4b00" class="pill">Open commitment</text><rect x="198" y="366" width="144" height="32" rx="16" fill="#e7edff"/><text x="270" y="387" text-anchor="middle" fill="#243f92" class="pill">Birthday in 11 days</text>
<rect x="38" y="430" width="304" height="72" rx="10" fill="#f7f8fb" stroke="#e1e6ef"/><text x="54" y="457" class="h" font-size="13">No cadence judgment</text><text x="54" y="480" class="m" font-size="12">Alex is not marked weak, neglected, or low value.</text>
<rect x="38" y="530" width="144" height="48" rx="9" fill="#3157c8"/><text x="110" y="560" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Open profile</text><rect x="198" y="530" width="144" height="48" rx="9" fill="#fff" stroke="#aeb9ca"/><text x="270" y="560" text-anchor="middle" class="h" font-size="14">Complete task</text>
<rect x="18" y="642" width="354" height="118" rx="14" fill="#fff" stroke="#d7deea"/><text x="34" y="672" class="h" font-size="14">Not enough capacity?</text><text x="34" y="696" class="m" font-size="12">Snooze or skip without creating a penalty.</text><rect x="34" y="714" width="146" height="36" rx="8" fill="#fff" stroke="#aeb9ca"/><text x="107" y="737" text-anchor="middle" class="h" font-size="12">Snooze until Friday</text><rect x="194" y="714" width="162" height="36" rx="8" fill="#fff" stroke="#aeb9ca"/><text x="275" y="737" text-anchor="middle" class="h" font-size="12">Skip this review</text>
<rect y="782" width="390" height="62" fill="#17233d"/><text x="48" y="819" text-anchor="middle" fill="#fff" font-size="12">Review</text><text x="147" y="819" text-anchor="middle" fill="#dbe3f5" font-size="12">People</text><text x="244" y="819" text-anchor="middle" fill="#dbe3f5" font-size="12">Topics</text><text x="342" y="819" text-anchor="middle" fill="#dbe3f5" font-size="12">Settings</text>
</svg>
