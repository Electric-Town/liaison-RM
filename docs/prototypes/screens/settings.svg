<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">Liaison RM settings and feature gates screen</title><desc id="desc">Desktop settings screen showing Airgap and Connected-local modes, local API gates, portable settings and provider-neutral backup configuration.</desc>
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif}.h{fill:#172033;font-weight:800}.m{fill:#5d687b}.card{fill:#fff;stroke:#d7deea}.nav{fill:#17233d}.badge{font-size:11px;font-weight:700}</style>
<rect width="1200" height="800" fill="#f4f6fb"/><rect class="nav" width="220" height="800"/><rect x="220" width="980" height="64" fill="#fff" stroke="#d7deea"/><rect x="18" y="16" width="38" height="38" rx="10" fill="#dfe7ff"/><text x="37" y="41" text-anchor="middle" font-weight="800" fill="#243f92">LR</text><text x="68" y="34" font-size="17" font-weight="800" fill="#fff">Liaison RM</text><text x="68" y="51" font-size="12" fill="#c7d2ed">Local workspace</text><text x="34" y="115" fill="#fff">Home</text><text x="34" y="165" fill="#fff">People</text><text x="34" y="215" fill="#fff">Events</text><text x="34" y="265" fill="#fff">Network</text><rect x="14" y="288" width="192" height="42" rx="8" fill="#344a7a"/><rect x="14" y="288" width="4" height="42" rx="2" fill="#a9bcff"/><text x="34" y="315" fill="#fff" font-weight="700">Settings</text><rect x="14" y="726" width="192" height="58" rx="8" fill="#263451" stroke="#5a6680"/><text x="28" y="752" fill="#fff" font-weight="700">Acme Dublin</text><text x="28" y="772" fill="#dbe3f5" font-size="12">Open-file vault · healthy</text>
<rect x="248" y="12" width="620" height="40" rx="9" fill="#fff" stroke="#d7deea"/><text x="266" y="38" class="m" font-size="14">Search settings and providers…</text><rect x="1018" y="12" width="154" height="40" rx="9" fill="#fff" stroke="#d7deea"/><text x="1095" y="38" text-anchor="middle" class="h" font-size="14">Export settings</text>
<text x="248" y="104" class="h" font-size="30">Settings and feature gates</text><text x="248" y="130" class="m" font-size="14">Portable settings with tokens and secrets excluded from exported configuration.</text>
<rect class="card" x="248" y="156" width="600" height="536" rx="12"/><text x="266" y="190" class="h" font-size="20">Local authority</text><text x="266" y="214" class="m" font-size="13">Every network capability is compiled or gated explicitly.</text>
<g><rect x="266" y="238" width="564" height="86" rx="10" fill="#fff" stroke="#d7deea"/><text x="282" y="270" class="h" font-size="15">Airgap build</text><text x="282" y="294" class="m" font-size="12">No networking code, remote provider or listener is present.</text><rect x="746" y="259" width="68" height="26" rx="13" fill="#e5f7ef"/><text x="780" y="277" text-anchor="middle" fill="#086b49" class="badge">Available</text></g>
<g><rect x="266" y="342" width="564" height="86" rx="10" fill="#fff" stroke="#d7deea"/><text x="282" y="374" class="h" font-size="15">Connected-local build</text><text x="282" y="398" class="m" font-size="12">Optional providers require purpose-bound grants.</text><rect x="762" y="369" width="52" height="30" rx="15" fill="#9ca7b9"/><circle cx="777" cy="384" r="11" fill="#fff"/><text x="704" y="389" class="m" font-size="12">Off</text></g>
<g><rect x="266" y="446" width="564" height="86" rx="10" fill="#fff" stroke="#d7deea"/><text x="282" y="478" class="h" font-size="15">Local API and MCP</text><text x="282" y="502" class="m" font-size="12">Loopback only; scoped tokens; all writes require approval.</text><rect x="762" y="473" width="52" height="30" rx="15" fill="#9ca7b9"/><circle cx="777" cy="488" r="11" fill="#fff"/><text x="704" y="493" class="m" font-size="12">Off</text></g>
<g><rect x="266" y="550" width="564" height="112" rx="10" fill="#fff0d7"/><text x="282" y="580" class="h" font-size="14">Export rules</text><text x="282" y="605" font-size="12">Includes layouts, topic packs, review policies and feature gates.</text><text x="282" y="627" font-size="12">Excludes passwords, OAuth tokens, private keys and sealed values.</text></g>
<rect class="card" x="866" y="156" width="306" height="536" rx="12"/><text x="884" y="190" class="h" font-size="20">Backup provider</text><text x="884" y="230" class="h" font-size="16">Local folder</text><text x="884" y="252" class="m" font-size="12">Reference provider · conformance checked</text><rect x="884" y="272" width="62" height="24" rx="12" fill="#e5f7ef"/><text x="915" y="289" text-anchor="middle" fill="#086b49" class="badge">backup</text><rect x="954" y="272" width="92" height="24" rx="12" fill="#e5f7ef"/><text x="1000" y="289" text-anchor="middle" fill="#086b49" class="badge">single writer</text>
<line x1="884" y1="320" x2="1152" y2="320" stroke="#d7deea"/><text x="884" y="354" class="h" font-size="14">Provider-neutral contract</text><text x="884" y="380" font-size="12">Google Drive, WebDAV, S3, MinIO,</text><text x="884" y="400" font-size="12">GCS and Azure implement versioned</text><text x="884" y="420" font-size="12">capabilities and safe-mode evidence.</text>
<text x="884" y="468" class="m" font-size="11" font-weight="700">LAST BACKUP</text><text x="884" y="492" font-size="13">Today, 09:42 · verified</text><text x="884" y="532" class="m" font-size="11" font-weight="700">RESTORE TEST</text><text x="884" y="556" font-size="13">15 July · isolated restore passed</text><rect x="884" y="608" width="268" height="44" rx="9" fill="#3157c8"/><text x="1018" y="636" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Run isolated restore test</text>
</svg>
