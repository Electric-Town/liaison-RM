<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">Liaison RM event dietary readiness screen</title><desc id="desc">Desktop event screen showing attendee coverage, verified, stale and unknown dietary states, and least-disclosure catering output.</desc>
