<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
<title id="title">Liaison RM mobile Today dashboard</title><desc id="desc">Narrow mobile dashboard with local vault status, reason-based review cards and event dietary readiness.</desc>
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif}.h{fill:#172033;font-weight:800}.m{fill:#5d687b}.card{fill:#fff;stroke:#d7deea}.badge{font-size:11px;font-weight:700}</style>
<rect width="390" height="844" fill="#f4f6fb"/><rect width="390" height="64" fill="#fff" stroke="#d7deea"/><rect x="14" y="13" width="38" height="38" rx="10" fill="#dfe7ff"/><text x="33" y="38" text-anchor="middle" font-weight="800" fill="#243f92">LR</text><text x="64" y="33" class="h" font-size="16">Liaison RM</text><text x="64" y="50" class="m" font-size="11">Local workspace</text><rect x="326" y="15" width="50" height="34" rx="8" fill="#fff" stroke="#d7deea"/><text x="351" y="37" text-anchor="middle" class="h" font-size="12">Menu</text>
<rect x="14" y="80" width="362" height="42" rx="9" fill="#fff" stroke="#d7deea"/><text x="28" y="106" class="m" font-size="13">Search people, notes and events…</text><text x="14" y="162" class="h" font-size="28">Today</text><text x="14" y="188" class="m" font-size="13">Reason-based review, sized to your capacity.</text>
<rect class="card" x="14" y="208" width="362" height="108" rx="12"/><text x="28" y="235" class="m" font-size="13">Friday event coverage</text><text x="28" y="274" class="h" font-size="30">91%</text><rect x="28" y="286" width="62" height="24" rx="12" fill="#fde8ed"/><text x="59" y="303" text-anchor="middle" fill="#a21d36" class="badge">4 gaps</text><rect x="112" y="287" width="238" height="8" rx="4" fill="#e7ebf2"/><rect x="112" y="287" width="216" height="8" rx="4" fill="#3157c8"/>
<rect class="card" x="14" y="332" width="362" height="218" rx="12"/><text x="28" y="362" class="h" font-size="18">Review reasons</text><g><rect class="card" x="28" y="382" width="334" height="62" rx="9"/><circle cx="54" cy="413" r="20" fill="#e7edff"/><text x="54" y="418" text-anchor="middle" font-weight="800" fill="#29449a">AO</text><text x="82" y="408" class="h" font-size="14">Aisling O'Connor</text><text x="82" y="429" class="m" font-size="12">Open commitment</text></g><g><rect class="card" x="28" y="458" width="334" height="62" rx="9"/><circle cx="54" cy="489" r="20" fill="#e7edff"/><text x="54" y="494" text-anchor="middle" font-weight="800" fill="#29449a">RP</text><text x="82" y="484" class="h" font-size="14">Ravi Patel</text><text x="82" y="505" class="m" font-size="12">Catering confirmation</text></g>
<rect class="card" x="14" y="566" width="362" height="178" rx="12"/><text x="28" y="596" class="h" font-size="18">Vault health</text><rect x="28" y="612" width="66" height="24" rx="12" fill="#e5f7ef"/><text x="61" y="629" text-anchor="middle" fill="#086b49" class="badge">Healthy</text><text x="28" y="664" font-size="12">Canonical records remain readable Markdown/YAML.</text><text x="28" y="686" font-size="12">Indexes can be rebuilt locally.</text><rect x="28" y="706" width="334" height="42" rx="9" fill="#3157c8"/><text x="195" y="733" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Open workspace</text>
<rect x="0" y="774" width="390" height="70" fill="#fff" stroke="#d7deea"/><text x="39" y="806" text-anchor="middle" class="h" font-size="12">Home</text><text x="116" y="806" text-anchor="middle" class="m" font-size="12">People</text><text x="195" y="806" text-anchor="middle" class="m" font-size="12">Events</text><text x="274" y="806" text-anchor="middle" class="m" font-size="12">Network</text><text x="351" y="806" text-anchor="middle" class="m" font-size="12">Settings</text><rect x="20" y="819" width="38" height="3" rx="2" fill="#3157c8"/><text x="14" y="838" class="m" font-size="10">No account required · no hidden telemetry</text>
</svg>
